<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    *,
    *::before,
    *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    :root {
        --bg0: #f1f5f9;
        --bg1: #ffffff;
        --bg2: #f8fafc;
        --bg3: #e2e8f0;
        --brd: #e2e8f0;
        --brd2: #cbd5e1;
        --tx1: #0f172a;
        --tx2: #334155;
        --tx3: #64748b;
        --acc: #0891b2;
        --acc2: #0e7490;
        --acc-bg: #e0f2fe;
        --grn: #059669;
        --grn-bg: #f0fdf4;
        --grn-brd: #86efac;
        --warn: #d97706;
        --warn-bg: #fffbeb;
        --warn-brd: #fde68a;
        --ok: #059669;
        --ok-bg: #f0fdf4;
        --err: #dc2626;
        --err-bg: #fef2f2;
        --sidebar-w: 240px;
        --hdr-h: 56px;
        --shadow: 0 1px 3px rgba(0, 0, 0, .08), 0 1px 2px rgba(0, 0, 0, .06);
        --shadow-md: 0 4px 6px rgba(0, 0, 0, .07), 0 2px 4px rgba(0, 0, 0, .06);
        --shadow-lg: 0 10px 15px rgba(0, 0, 0, .1), 0 4px 6px rgba(0, 0, 0, .05);
    }

    body {
        font-family: 'Inter', sans-serif;
        background: var(--bg0);
        color: var(--tx1);
        font-size: 13px;
    }

    /* --- Loading --- */
    #loading-screen {
        position: fixed;
        inset: 0;
        background: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
    }

    .loading-content {
        text-align: center;
    }

    .loading-logo {
        width: 56px;
        height: 56px;
        border-radius: 14px;
        background: linear-gradient(135deg, #0891b2, #0d9488);
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 16px;
        font-size: 24px;
        box-shadow: 0 8px 24px rgba(8, 145, 178, .3);
    }

    .loading-content h1 {
        font-size: 1.3rem;
        font-weight: 700;
        color: var(--tx1);
    }

    .loading-content p {
        color: var(--tx3);
        font-size: .83rem;
        margin-top: 6px;
    }

    .loading-bar {
        width: 200px;
        height: 3px;
        background: var(--bg3);
        border-radius: 2px;
        margin: 16px auto 0;
        overflow: hidden;
    }

    .loading-bar::after {
        content: '';
        display: block;
        height: 100%;
        width: 40%;
        background: linear-gradient(90deg, #0891b2, #0d9488);
        border-radius: 2px;
        animation: loadbar 1.4s ease-in-out infinite;
    }

    @keyframes loadbar {
        0% {
            transform: translateX(-120%)
        }

        100% {
            transform: translateX(350%)
        }
    }

    /* --- App layout --- */
    #app.hidden {
        display: none;
    }

    .app-layout {
        display: flex;
        min-height: 100vh;
    }

    /* --- Sidebar --- */
    .sidebar {
        width: var(--sidebar-w);
        background: var(--bg1);
        border-right: 1px solid var(--brd);
        display: flex;
        flex-direction: column;
        position: fixed;
        top: 0;
        bottom: 0;
        left: 0;
        z-index: 100;
        box-shadow: var(--shadow);
    }

    .sidebar-logo {
        padding: 16px;
        display: flex;
        align-items: center;
        gap: 10px;
        border-bottom: 1px solid var(--brd);
    }

    .logo-icon {
        width: 34px;
        height: 34px;
        border-radius: 9px;
        background: linear-gradient(135deg, #0891b2, #0d9488);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: .82rem;
        color: #fff;
    }

    .logo-text {
        font-weight: 700;
        font-size: .92rem;
        color: var(--tx1);
        line-height: 1.2;
    }

    .logo-sub {
        font-size: .7rem;
        color: var(--tx3);
        font-weight: 400;
    }

    .sidebar-nav {
        padding: 8px 0;
        flex: 1;
        overflow-y: auto;
    }

    .nav-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 9px 16px;
        color: var(--tx2);
        cursor: pointer;
        font-weight: 500;
        font-size: .82rem;
        border-radius: 0;
        transition: all .15s;
        border-left: 3px solid transparent;
        text-decoration: none;
    }

    .nav-item:hover {
        background: var(--bg0);
        color: var(--tx1);
    }

    .nav-item.active {
        background: var(--acc-bg);
        color: var(--acc2);
        border-left-color: var(--acc);
        font-weight: 600;
    }

    .nav-icon {
        font-size: 15px;
        width: 18px;
        text-align: center;
        flex-shrink: 0;
    }

    .nav-badge {
        margin-left: auto;
        background: var(--err);
        color: #fff;
        font-size: .65rem;
        font-weight: 700;
        padding: 1px 6px;
        border-radius: 10px;
    }

    .sidebar-user {
        padding: 12px 16px;
        border-top: 1px solid var(--brd);
    }

    .user-pill {
        display: flex;
        align-items: center;
        gap: 9px;
    }

    .user-avatar {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: linear-gradient(135deg, #0891b2, #0d9488);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: .68rem;
        font-weight: 700;
        flex-shrink: 0;
    }

    .user-info {
        min-width: 0;
    }

    .user-email {
        font-size: .72rem;
        color: var(--tx2);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        font-weight: 500;
    }

    .badge-admin {
        font-size: .6rem;
        background: var(--acc-bg);
        color: var(--acc2);
        padding: 1px 6px;
        border-radius: 8px;
        font-weight: 600;
        border: 1px solid var(--acc);
        margin-top: 2px;
        display: inline-block;
    }

    /* --- Main content --- */
    .main {
        margin-left: var(--sidebar-w);
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
    }

    /* --- Header --- */
    .top-bar {
        height: var(--hdr-h);
        background: var(--bg1);
        border-bottom: 1px solid var(--brd);
        display: flex;
        align-items: center;
        padding: 0 20px;
        gap: 12px;
        position: sticky;
        top: 0;
        z-index: 50;
        box-shadow: var(--shadow);
    }

    .top-bar h2 {
        font-size: .95rem;
        font-weight: 600;
        flex: 1;
        color: var(--tx1);
    }

    .top-actions {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    a#sheetLink {
        font-size: .75rem;
        color: var(--acc);
        text-decoration: none;
        padding: 5px 10px;
        border: 1px solid var(--brd2);
        border-radius: 6px;
        font-weight: 500;
    }

    a#sheetLink:hover {
        background: var(--acc-bg);
    }

    /* --- Page tabs --- */
    .page-tabs {
        display: flex;
        gap: 1px;
        border-bottom: 1px solid var(--brd);
        background: var(--bg1);
        padding: 0 20px;
    }

    .tab-btn {
        padding: 10px 18px;
        font-size: .82rem;
        font-weight: 500;
        color: var(--tx3);
        cursor: pointer;
        border: none;
        background: none;
        border-bottom: 2px solid transparent;
        margin-bottom: -1px;
        transition: all .15s;
    }

    .tab-btn:hover {
        color: var(--tx1);
    }

    .tab-btn.active {
        color: var(--acc2);
        border-bottom-color: var(--acc);
        font-weight: 600;
    }

    /* --- Buttons --- */
    .btn-primary {
        padding: 7px 14px;
        background: var(--acc);
        color: #fff;
        border: none;
        border-radius: 7px;
        font-size: .8rem;
        font-weight: 600;
        cursor: pointer;
        transition: all .15s;
        font-family: inherit;
    }

    .btn-primary:hover {
        background: var(--acc2);
        transform: translateY(-1px);
        box-shadow: var(--shadow-md);
    }

    .btn-secondary {
        padding: 7px 14px;
        background: var(--bg1);
        color: var(--tx2);
        border: 1px solid var(--brd2);
        border-radius: 7px;
        font-size: .8rem;
        font-weight: 500;
        cursor: pointer;
        transition: all .15s;
        font-family: inherit;
    }

    .btn-secondary:hover {
        background: var(--bg0);
        border-color: var(--acc);
        color: var(--acc);
    }

    .btn-warn {
        background: var(--warn);
        color: #fff;
        border: none;
        border-radius: 7px;
        padding: 7px 14px;
        font-size: .8rem;
        font-weight: 600;
        cursor: pointer;
        font-family: inherit;
    }

    .btn-icon {
        border: none;
        background: none;
        cursor: pointer;
        color: var(--tx3);
        padding: 4px 6px;
        border-radius: 5px;
        font-size: 13px;
        transition: all .15s;
    }

    .btn-icon:hover {
        background: var(--bg3);
        color: var(--tx1);
    }

    /* --- Filters bar --- */
    .filter-bar {
        background: var(--bg1);
        border-bottom: 1px solid var(--brd);
        padding: 10px 20px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
    }

    .filter-bar input,
    .filter-bar select {
        padding: 6px 10px;
        border: 1px solid var(--brd2);
        border-radius: 7px;
        background: var(--bg2);
        color: var(--tx1);
        font-size: .78rem;
        outline: none;
        font-family: inherit;
        transition: border-color .15s;
    }

    .filter-bar input:focus,
    .filter-bar select:focus {
        border-color: var(--acc);
        background: #fff;
    }

    .filter-bar input[type="date"] {
        color: var(--tx1);
    }

    .filter-bar .filter-sep {
        width: 1px;
        height: 22px;
        background: var(--brd2);
        margin: 0 2px;
    }

    #searchInput {
        min-width: 190px;
    }

    .filter-right {
        margin-left: auto;
        display: flex;
        gap: 8px;
        align-items: center;
    }

    /* --- Import Banner --- */
    .import-banner {
        background: var(--acc-bg);
        border-bottom: 1px solid var(--acc);
        padding: 8px 20px;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .import-banner span {
        color: var(--acc2);
        font-size: .8rem;
        font-weight: 500;
    }

    .spinner {
        width: 16px;
        height: 16px;
        border: 2px solid var(--brd2);
        border-top-color: var(--acc);
        border-radius: 50%;
        animation: spin .7s linear infinite;
    }

    @keyframes spin {
        to {
            transform: rotate(360deg);
        }
    }

    /* --- Stats cards --- */
    .stats-bar {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
        padding: 16px 20px;
    }

    .stat-card {
        background: var(--bg1);
        border: 1px solid var(--brd);
        border-radius: 10px;
        padding: 14px 16px;
        box-shadow: var(--shadow);
    }

    .stat-card-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
    }

    .stat-label {
        font-size: .72rem;
        color: var(--tx3);
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: .04em;
    }

    .stat-icon {
        font-size: 16px;
    }

    .stat-value {
        font-size: 1.4rem;
        font-weight: 700;
        color: var(--tx1);
        margin-top: 6px;
    }

    .stat-sub {
        font-size: .72rem;
        color: var(--tx3);
        margin-top: 3px;
    }

    .stat-card.warn-card {
        border-left: 3px solid var(--warn);
    }

    .stat-card.ok-card {
        border-left: 3px solid var(--ok);
    }

    /* --- Table container --- */
    .table-container {
        padding: 0 20px 20px;
        flex: 1;
    }

    .table-meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 0;
    }

    .table-meta-info {
        font-size: .75rem;
        color: var(--tx3);
    }

    .table-wrap {
        background: var(--bg1);
        border: 1px solid var(--brd);
        border-radius: 10px;
        overflow-x: auto;
        box-shadow: var(--shadow);
    }

    table {
        width: 100%;
        border-collapse: collapse;
    }

    thead th {
        padding: 9px 12px;
        text-align: left;
        font-size: .7rem;
        font-weight: 600;
        color: var(--tx3);
        background: var(--bg2);
        text-transform: uppercase;
        letter-spacing: .04em;
        border-bottom: 1px solid var(--brd);
        white-space: nowrap;
        position: sticky;
        top: 0;
    }

    thead th.col-manual {
        background: #ecfdf5;
        color: #065f46;
    }

    tbody tr {
        border-bottom: 1px solid var(--brd);
        transition: background .1s;
    }

    tbody tr:last-child {
        border-bottom: none;
    }

    tbody tr:hover {
        background: var(--bg0);
    }

    tbody tr.over-limit {
        background: var(--warn-bg);
    }

    tbody tr.over-limit td:first-child {
        border-left: 3px solid var(--warn);
    }

    tbody td {
        padding: 7px 12px;
        color: var(--tx2);
        font-size: .78rem;
    }

    tbody td.col-manual {
        background: rgba(240, 253, 244, .5);
    }

    .cell-select {
        border: 1px solid transparent;
        background: transparent;
        color: var(--tx1);
        font-size: .77rem;
        padding: 3px 4px;
        border-radius: 5px;
        cursor: pointer;
        outline: none;
        font-family: inherit;
        max-width: 150px;
    }

    .cell-select:hover,
    .cell-select:focus {
        border-color: var(--acc);
        background: #fff;
    }

    .cell-text {
        border: 1px solid transparent;
        background: transparent;
        color: var(--tx1);
        font-size: .77rem;
        padding: 3px 6px;
        border-radius: 5px;
        outline: none;
        width: 100%;
        font-family: inherit;
    }

    .cell-text:hover,
    .cell-text:focus {
        border-color: var(--acc);
        background: #fff;
    }

    .badge {
        padding: 2px 7px;
        border-radius: 5px;
        font-size: .68rem;
        font-weight: 600;
        white-space: nowrap;
    }

    .badge-ok {
        background: var(--ok-bg);
        color: var(--ok);
    }

    .badge-warn {
        background: var(--warn-bg);
        color: var(--warn);
    }

    .badge-err {
        background: var(--err-bg);
        color: var(--err);
    }

    .badge-def {
        background: var(--bg3);
        color: var(--tx3);
    }

    .badge-limit {
        background: var(--warn-bg);
        color: var(--warn);
        border: 1px solid var(--warn-brd);
    }

    .inv-btn {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 3px 9px;
        border: 1px solid var(--brd2);
        background: var(--bg2);
        border-radius: 5px;
        font-size: .72rem;
        cursor: pointer;
        color: var(--tx2);
        font-family: inherit;
        transition: all .12s;
    }

    .inv-btn:hover {
        border-color: var(--acc);
        color: var(--acc);
        background: var(--acc-bg);
    }

    .inv-btn.has-file {
        border-color: var(--grn-brd);
        background: var(--grn-bg);
        color: var(--grn);
    }

    .inv-uuid {
        font-size: .65rem;
        color: var(--tx3);
        font-family: monospace;
        display: block;
        margin-top: 2px;
    }

    .inv-cell {
        display: flex;
        flex-direction: column;
    }

    .limit-warn-tag {
        display: inline-block;
        font-size: .62rem;
        background: var(--warn-bg);
        color: var(--warn);
        border: 1px solid var(--warn-brd);
        padding: 1px 5px;
        border-radius: 4px;
        font-weight: 600;
        margin-left: 4px;
    }

    .empty-cell {
        padding: 40px !important;
        text-align: center;
    }

    .empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        color: var(--tx3);
    }

    /* --- Modals --- */
    .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, .35);
        z-index: 200;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }

    .modal-overlay.hidden {
        display: none;
    }

    .modal {
        background: var(--bg1);
        border-radius: 14px;
        box-shadow: var(--shadow-lg);
        width: 100%;
        max-width: 560px;
        max-height: 88vh;
        overflow-y: auto;
        border: 1px solid var(--brd);
    }

    .modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 20px;
        border-bottom: 1px solid var(--brd);
    }

    .modal-title {
        font-size: .95rem;
        font-weight: 700;
        color: var(--tx1);
    }

    .modal-body {
        padding: 20px;
    }

    .modal-wide {
        max-width: 800px;
    }

    .itabs {
        display: flex;
        gap: 2px;
        margin-bottom: 16px;
        background: var(--bg0);
        border-radius: 8px;
        padding: 3px;
    }

    .itab {
        flex: 1;
        padding: 7px;
        text-align: center;
        font-size: .78rem;
        font-weight: 500;
        cursor: pointer;
        border: none;
        background: none;
        border-radius: 6px;
        color: var(--tx3);
        font-family: inherit;
        transition: all .15s;
    }

    .itab.active {
        background: var(--bg1);
        color: var(--acc2);
        font-weight: 600;
        box-shadow: var(--shadow);
    }

    .itab-body {
        display: none;
    }

    .itab-body:not(.hidden) {
        display: block;
    }

    .drop-zone {
        border: 2px dashed var(--brd2);
        border-radius: 10px;
        padding: 28px;
        text-align: center;
        cursor: pointer;
        transition: all .15s;
        color: var(--tx3);
    }

    .drop-zone:hover,
    .drop-zone.drag-over {
        border-color: var(--acc);
        background: var(--acc-bg);
        color: var(--acc2);
    }

    .drop-zone input[type="file"] {
        display: none;
    }

    .drop-icon {
        font-size: 1.8rem;
        margin-bottom: 8px;
    }

    .drop-label {
        font-size: .8rem;
        font-weight: 500;
    }

    .drop-sub {
        font-size: .72rem;
        margin-top: 4px;
    }

    .uuid-result {
        background: var(--grn-bg);
        border: 1px solid var(--grn-brd);
        border-radius: 8px;
        padding: 12px;
        margin-top: 12px;
    }

    .uuid-val {
        font-family: monospace;
        font-size: .78rem;
        color: var(--grn);
        word-break: break-all;
        margin-top: 4px;
    }

    .form-row {
        margin-bottom: 14px;
    }

    .form-row label {
        display: block;
        font-size: .75rem;
        font-weight: 600;
        color: var(--tx2);
        margin-bottom: 5px;
    }

    .form-row input,
    .form-row select,
    .form-row textarea {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid var(--brd2);
        border-radius: 7px;
        background: var(--bg2);
        color: var(--tx1);
        font-size: .8rem;
        outline: none;
        font-family: inherit;
        transition: border-color .15s;
    }

    .form-row input:focus,
    .form-row select:focus,
    .form-row textarea:focus {
        border-color: var(--acc);
        background: #fff;
    }

    .form-row-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
    }

    .form-hint {
        font-size: .7rem;
        color: var(--tx3);
        margin-top: 4px;
    }

    .modal-footer {
        padding: 14px 20px;
        border-top: 1px solid var(--brd);
        display: flex;
        justify-content: flex-end;
        gap: 8px;
    }

    /* --- Dashboard --- */
    .dash-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        padding: 20px;
    }

    .dash-card {
        background: var(--bg1);
        border: 1px solid var(--brd);
        border-radius: 12px;
        padding: 20px;
        box-shadow: var(--shadow);
    }

    .dash-card.full-width {
        grid-column: 1 / -1;
    }

    .dash-card h3 {
        font-size: .82rem;
        font-weight: 600;
        color: var(--tx2);
        margin-bottom: 16px;
        text-transform: uppercase;
        letter-spacing: .04em;
    }

    .chart-wrap {
        height: 220px;
        position: relative;
    }

    .dash-filter-bar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        padding: 12px 20px;
        background: var(--bg1);
        border-bottom: 1px solid var(--brd);
    }

    .dash-filter-bar label {
        font-size: .75rem;
        color: var(--tx3);
        font-weight: 500;
    }

    .dash-filter-bar input,
    .dash-filter-bar select {
        padding: 5px 9px;
        border: 1px solid var(--brd2);
        border-radius: 6px;
